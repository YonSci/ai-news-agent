databases: []
services:
  - type: web
    name: ai-news-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/stats/dashboard
    disk:
      name: ai-news-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USER_AGENT
        value: AI-News-Agent/1.0 by YourUsername
      - key: TIKTOK_AUTO_UPLOAD
        value: "0"
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_API_BASE_URL
        value: https://open.tiktokapis.com
      - key: TIKTOK_PRIVACY_LEVEL
        value: SELF_ONLY
      - key: TIKTOK_DISABLE_COMMENT
        value: "0"
      - key: TIKTOK_DISABLE_DUET
        value: "0"
      - key: TIKTOK_DISABLE_STITCH
        value: "0"
      - key: MAX_STORIES_PER_DAY
        value: "5"
      - key: TARGET_VIDEO_LENGTH
        value: "45"

  - type: worker
    name: ai-news-scheduler
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    startCommand: python src/orchestrator.py schedule
    disk:
      name: ai-news-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USER_AGENT
        value: AI-News-Agent/1.0 by YourUsername
      - key: TIKTOK_AUTO_UPLOAD
        value: "0"
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_API_BASE_URL
        value: https://open.tiktokapis.com
      - key: TIKTOK_PRIVACY_LEVEL
        value: SELF_ONLY
      - key: TIKTOK_DISABLE_COMMENT
        value: "0"
      - key: TIKTOK_DISABLE_DUET
        value: "0"
      - key: TIKTOK_DISABLE_STITCH
        value: "0"
      - key: MAX_STORIES_PER_DAY
        value: "5"
      - key: TARGET_VIDEO_LENGTH
        value: "45"
