name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint changed Python files with flake8
        shell: pwsh
        run: |
          pip install flake8

          $event = Get-Content $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          if ($env:GITHUB_EVENT_NAME -eq 'pull_request') {
            $baseSha = $event.pull_request.base.sha
          } else {
            $baseSha = $event.before
          }

          $changedFiles = git diff --name-only $baseSha $env:GITHUB_SHA -- '*.py'
          if (-not $changedFiles) {
            Write-Host 'No Python files changed; skipping flake8.'
            exit 0
          }

          $pythonFiles = $changedFiles | Where-Object { $_ -like 'src/*.py' -or $_ -like 'tests/*.py' }
          if (-not $pythonFiles) {
            Write-Host 'No tracked Python files changed; skipping flake8.'
            exit 0
          }

          flake8 @pythonFiles --max-line-length=100 --exclude=__pycache__

      - name: Run tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  daily-news:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * *'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run research
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python src/orchestrator.py pipeline

      - name: Upload briefs
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefs
          path: data/briefs/
          retention-days: 7
